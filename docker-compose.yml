version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: auction-mysql
    environment:
      MYSQL_DATABASE: auction_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: auction_user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: auction-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: